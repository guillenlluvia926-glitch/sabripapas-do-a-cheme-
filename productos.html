<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sabripapas Doña Cheme</title>

  <style>
    body {
      background-color: #F5F5DC;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #E75480;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }

    .producto {
      background-color: #FFF0F5;
      border-radius: 15px;
      width: 250px;
      margin: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    .producto h2 {
      color: #E75480;
    }

    .precio {
      color: #C4A484;
      font-size: 18px;
      margin: 10px 0;
    }

    button {
      background-color: #F8AFA6;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background-color: #E75480;
    }

    footer {
      background-color: #EED9C4;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Sabripapas Doña Cheme</h1>
  <p>¡Las mejores sabripapas de la ciudad! 😋</p>
</header>

<section class="contenedor">

  <div class="producto">
    <img src="clasica.jpg" alt="Sabripapas clásicas">
    <h2>Sabripapas Clásicas</h2>
    <p class="precio">$35</p>
    <button>Comprar</button>
  </div>

  <div class="producto">
    <img src="queso.jpg" alt="Sabripapas con queso">
    <h2>Sabripapas con Queso</h2>
    <p class="precio">$45</p>
    <button>Comprar</button>
  </div>

  <div class="producto">
    <img src="especiales.jpg" alt="Sabripapas especiales">
    <h2>Sabripapas Especiales</h2>
    <p class="precio">$55</p>
    <button>Comprar</button>
  </div>

</section>

<footer>
  <p>📍 Chimalhuacán | 📞 55-1234-5678</p>
  <p>© 2026 Doña Cheme</p>
</footer>

</body>
</html>
