<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Sabripapas Doña Cheme</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff8e7;
            text-align: center;
        }
        h1 {
            color: #d35400;
        }
        .contenedor {
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            border: 2px solid #f39c12;
        }
        input, textarea {
            width: 90%;
            padding: 8px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #d35400;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e67e22;
        }
    </style>
</head>

<body>

    <h1>📞 Contacto</h1>
    <p>¡Contáctanos para hacer tu pedido!</p>

    <div class="contenedor">
        <form>
            <input type="text" placeholder="Tu nombre" required><br>
            <input type="email" placeholder="Tu numero" required><br>
            <textarea placeholder="Escribe tu mensaje" rows="4" required></textarea><br>
            <button type="submit">Enviar</button>
        </form>
    </div>

    <h2>📍 Información</h2>
    <p>Dirección: Calle Sabritas #123</p>
    <p>Teléfono: 55-1234-5678</p>
    <p>Email: sabripapas@donacheme.com</p>

    <footer>
        <p>© 2026 Sabripapas Doña Cheme</p>
    </footer>

</body>
</html>
